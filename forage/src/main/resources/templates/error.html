<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Erreur</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 60px auto;
            padding: 0 16px;
            color: #1f2933;
            background: #f7f9fb;
        }

        main {
            background: white;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            padding: 28px;
        }

        h1 {
            margin-top: 0;
            color: #b42318;
        }

        p {
            line-height: 1.5;
        }

        a {
            color: #155eef;
            font-weight: 600;
        }
    </style>
</head>
<body>
<main>
    <h1>Erreur <span th:text="${statusCode}">500</span></h1>
    <p th:text="${message}">Une erreur est survenue pendant le traitement de la demande.</p>
    <p th:if="${requestUri != ''}">
        Page demandée : <strong th:text="${requestUri}">/</strong>
    </p>
    <p>
        <a th:href="@{/demande/formulaire}">Retour au formulaire de demande</a>
    </p>
</main>
</body>
</html>
