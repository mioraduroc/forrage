<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Demande</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 16px;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
        }

        button {
            width: fit-content;
            padding: 10px 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Créer une demande</h2>

<div style="margin-bottom: 20px;">
    <a th:href="@{/demande/liste}"
       style="
            background: #2c3e50;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
       ">
        Voir la liste des demandes
    </a>
</div>

<form th:action="@{/demande/save}" th:object="${demande}" method="post">

    <div>
        <label for="reference">Référence :</label>
        <input id="reference" type="text" th:field="*{reference}" maxlength="20" required>
    </div>

    <div>
        <label for="client">Client :</label>
        <select id="client" th:field="*{client.id}" required>
            <option value="">-- Choisir un client --</option>
            <option th:each="client : ${clients}"
                    th:value="${client.id}"
                    th:text="${client.nom + ' - ' + client.contact}">
            </option>
        </select>
    </div>

    <div>
        <label for="lieu">Lieu :</label>
        <input id="lieu" type="text" th:field="*{lieu}" maxlength="20" required>
    </div>
    
    <div>
        <label for="commune">Commune :</label>
        <select id="commune" th:field="*{commune.id}" required>
            <option value="">-- Choisir une commune --</option>
            <option th:each="commune : ${communes}"
                    th:value="${commune.id}"
                    th:text="${commune.libelle + ' (' + commune.district.libelle + ')'+ ' (' + commune.district.region.libelle + ')'}">
            </option>
        </select>
    </div>

    <button type="submit">Enregistrer</button>

</form>

</body>
</html>
